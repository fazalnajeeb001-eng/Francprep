[build]
  command = "NITRO_PRESET=netlify npm run build"
  publish = ".netlify/functions-internal"

[[redirects]]
  from = "/api/*"
  to = "https://francprep-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
